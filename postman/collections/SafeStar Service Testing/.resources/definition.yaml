$kind: collection
name: SafeStar Service Testing
description: "A reusable testing template for the SafeStar Service API. Provides a structured starting point for building out a full test suite, organized into five test categories: Functional Tests, Integration Tests, Performance Tests, Validation/Schema Tests, and Workflow Tests. The Workflow Tests folder includes two pre-built end-to-end scenarios — a complete successful startup and safety check flow, and a student challenge scenario covering error handling and diagnostic reporting — each with Setup and Teardown steps."
variables:
  driverID: "1001"
  vehicleID: "1002"
  safetyScanID: ""
  diagnosticRunID: ""
  driverProfileId: ""
  vehicleId: ""
  runId: ""
  reportId: ""
auth:
  - id: f9828519-e698-4651-8c06-bfdcd2ed2ea1
    type: jwt
    name: jwt auth
    credentials:
      isSecretBase64Encoded: true
      secret: "{{jwtSecret}}"
      algorithm: HS256
      payload: "{}"
      addTokenTo: header
      headerPrefix: Bearer
      queryParamKey: token
      header: "{}"
